<!-- GSM Cashback Tracking Script -->
<script>
(function() {
  window.GSM = {
    brandId: '697b9599afb2ae3c366b6753',
    apiUrl: 'https://gsm-v2-api-5ffdf926b962.herokuapp.com',
    
    init: function() {
      var urlParams = new URLSearchParams(window.location.search);
      var trackingCode = urlParams.get('gsm_tracking');
      
      if (trackingCode) {
        localStorage.setItem('gsm_tracking_code', trackingCode);
        localStorage.setItem('gsm_tracking_expires', Date.now() + 7*24*60*60*1000);
        console.log('✅ GSM tracking code captured:', trackingCode);
      }
    },
    
    trackPurchase: function(data) {
      var trackingCode = localStorage.getItem('gsm_tracking_code');
      var expires = localStorage.getItem('gsm_tracking_expires');
      
      if (!trackingCode) {
        console.log('❌ No GSM tracking code found');
        return Promise.resolve({ success: false, message: 'No tracking code' });
      }
      
      if (Date.now() > parseInt(expires)) {
        console.log('❌ GSM tracking code expired');
        localStorage.removeItem('gsm_tracking_code');
        localStorage.removeItem('gsm_tracking_expires');
        return Promise.resolve({ success: false, message: 'Tracking code expired' });
      }
      
      console.log('📤 Sending purchase to GSM:', {
        orderId: data.orderId,
        amount: data.amount,
        trackingCode: trackingCode
      });
      
      return fetch(this.apiUrl + '/purchases/webhook/purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          trackingCode: trackingCode,
          orderId: data.orderId,
          amount: data.amount,
          currency: data.currency || 'USD',
          customerEmail: data.customerEmail || '',
          purchaseDate: new Date().toISOString(),
          status: 'completed'
        })
      })
      .then(function(response) { return response.json(); })
      .then(function(result) {
        if (result.success) {
          console.log('✅ Purchase tracked successfully!', result);
          console.log('💰 Tokens earned:', result.tokensEarned);
          localStorage.removeItem('gsm_tracking_code');
          localStorage.removeItem('gsm_tracking_expires');
        } else {
          console.error('❌ Failed to track purchase:', result);
        }
        return result;
      })
      .catch(function(err) {
        console.error('❌ Error tracking purchase:', err);
        return { success: false, error: err.message };
      });
    }
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      window.GSM.init();
    });
  } else {
    window.GSM.init();
  }
})();
</script>
